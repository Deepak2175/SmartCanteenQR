services:
  - type: web
    name: smartcanteen
    runtime: node
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartcanteen-db
          property: connectionString
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: KIMI_AUTH_URL
        sync: false
      - key: KIMI_OPEN_URL
        sync: false
      - key: OWNER_UNION_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
    healthCheckPath: /api/health

databases:
  - name: smartcanteen-db
    plan: free